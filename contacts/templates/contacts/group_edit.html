{% extends "base.html" %}

{% block content %}

<!-- OVERLAY -->

<div class="fixed inset-0 bg-gray-900/40 flex items-center justify-center z-50">

<!-- MODAL -->

<div class="bg-white rounded-lg shadow-xl w-full max-w-lg">

<!-- HEADER -->

<div class="bg-orange-500 text-white px-6 py-4 rounded-t-lg flex justify-between items-center">

<h2 class="text-lg font-semibold">
Modifier un Groupe de Contacts
</h2>

<a href="{% url 'contact_groups_list' %}" class="text-white text-xl hover:text-gray-200">
×
</a>

</div>


<!-- FORM -->

<form method="POST" class="p-6">

{% csrf_token %}

<!-- NOM -->

<label class="block text-sm font-medium text-gray-700 mb-2">
Nom du groupe *
</label>

<input
type="text"
name="name"
value="{{ group.name }}"
class="w-full border border-gray-300 rounded-lg p-2 mb-4 focus:ring-2 focus:ring-orange-400 focus:border-orange-400"
required
>


<!-- DESCRIPTION -->

<label class="block text-sm font-medium text-gray-700 mb-2">
Description
</label>

<textarea
name="description"
rows="4"
placeholder="Ajouter une description ici ..."
class="w-full border border-gray-300 rounded-lg p-2 mb-6 focus:ring-2 focus:ring-orange-400 focus:border-orange-400"
>{{ group.description }}</textarea>


<!-- FOOTER -->

<div class="flex justify-end gap-3">

<a
href="{% url 'contact_groups_list' %}"
class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300"
>
Fermer
</a>

<button
type="submit"
class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
>
Enregistrer
</button>

</div>

</form>

</div>

</div>

{% endblock %}
