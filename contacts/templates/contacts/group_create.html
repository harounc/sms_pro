{% extends "base.html" %}
{% block title %}Créer un groupe{% endblock %}

{% block content %}

<h2 class="text-3xl font-bold text-green-600 mb-6">
Créer un groupe de contacts
</h2>

{% if error %}
<div class="bg-red-100 text-red-800 p-3 mb-4 rounded">
    {{ error }}
</div>
{% endif %}

<form method="POST" class="space-y-6">
{% csrf_token %}

<div>
<label class="block font-semibold mb-2">
Nom du groupe <span class="text-red-500">*</span>
</label>

<input type="text"
name="name"
required
value="{{ name|default:'' }}"
class="w-full border rounded-lg p-3"
placeholder="Ex: Clients VIP">

</div>

<div>
<label class="block font-semibold mb-2">
Description
</label>

<textarea
name="description"
rows="4"
class="w-full border rounded-lg p-3"
placeholder="Notes internes sur ce groupe">{{ description|default:'' }}</textarea>

</div>

<button type="submit"
class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg">

Créer le groupe

</button>

</form>

{% endblock %}
