{% extends 'base.html' %}

{% block title %}Modifier le contact{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white shadow rounded-lg p-6">
    
    <h2 class="text-xl font-bold mb-6 text-orange-600">
        Modifier contact
    </h2>
    
    <form method="post">

        {% csrf_token %}

        <label class="block text-sm mb-1">Téléphone</label>
        <input type="text" name="phone" value="{{ contact.phone }}" class="w-full border rounded p-2 mb-4">

        <label class="block text-sm mb-1">Nom</label>
        <input type="text" name="name" value="{{ contact.name }}" class="w-full border rounded p-2 mb-4">

        <label class="block text-sm mb-1">Email</label>
        <input type="email" name="email" value="{{ contact.email }}" class="w-full border rounded p-2 mb-4">

        <button class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
            Enregistrer
        </button>
    </form>
</div>
{% endblock %}
