{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Connexion - ISS SMS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Georgia, serif; }
</style>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-10 rounded-xl shadow-lg w-96">

<!-- Logo -->
<div class="flex justify-center mb-4">

<img src="{% static 'images/logo_iss.jpg' %}"
alt="Logo"
class="h-16">

</div>


<!-- Nom plateforme -->
<h1 class="text-center text-xl font-bold text-gray-700 mb-2">
ISS SMS
</h1>


<!-- Titre -->
<h2 class="text-2xl font-bold text-green-600 mb-6 text-center">
Connexion
</h2>


{% if request.method == "POST" and messages %}
{% for message in messages %}

<div class="mb-4 p-3 bg-red-100 text-red-700 rounded">
{{ message }}
</div>

{% endfor %}
{% endif %}


<form method="post">

{% csrf_token %}

<div class="mb-4">

<label class="block mb-2 text-gray-600">
Nom d'utilisateur
</label>

<input type="text"
name="username"
class="w-full border p-2 rounded focus:ring-2 focus:ring-green-400">

</div>


<!-- Mot de passe field -->
<div class="mb-4">

    <label class="block mb-2 text-gray-600">
        Mot de passe
    </label>

<div class="relative">

<input type="password"
name="password"
id="password"
class="w-full border p-2 rounded focus:ring-2 focus:ring-green-400">

<button type="button"
onclick="togglePassword()"
class="absolute right-2 top-2 text-gray-500">

👁

</button>

</div>

</div>




<!-- Se souvenir de moi -->
<div class="flex items-center justify-between mb-6">

<label class="flex items-center gap-2 text-sm text-gray-600">

<input type="checkbox"
name="remember_me"
class="rounded border-gray-300">

Se souvenir de moi

</label>

</div>


<button type="submit"
class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700 transition">

Se connecter

</button>


<!-- Password Reset -->
<div class="text-center mt-4">

<a href="{% url 'password_reset' %}"
class="text-sm text-green-600 hover:underline">

Mot de passe oublié ?

</a>

</div>

</form>

</div>

<!-- JavaScript for password toggle -->
<script>

function togglePassword()
{
const password = document.getElementById("password")

if (password.type === "password")
{
password.type = "text"
}
else
{
password.type = "password"
}

}

</script>


</body>
</html>
