{% extends "base.html" %}

{% block title %}Entreprise{% endblock %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">
    {% if form.instance.pk %}
        Modifier l’entreprise
    {% else %}
        Nouvelle entreprise
    {% endif %}
</h2>

<form method="post" class="bg-white p-6 rounded shadow-md max-w-lg">
    {% csrf_token %}

    <div class="mb-4">
        <label class="block mb-2 font-semibold">Nom</label>
        {{ form.name }}
    </div>

    <div class="mb-4">
        <label class="block mb-2 font-semibold">Solde</label>
        {{ form.balance }}
    </div>

    <div class="mb-4 flex items-center space-x-2">
        {{ form.is_active }}
        <label>Entreprise active</label>
    </div>

    <div class="flex space-x-4">
        <button type="submit"
                class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
            Enregistrer
        </button>

        <a href="{% url 'company_list' %}"
           class="bg-gray-300 px-4 py-2 rounded">
            Annuler
        </a>
    </div>
</form>

{% endblock %}
