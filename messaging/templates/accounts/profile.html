{% extends "base.html" %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">
Mon Profil
</h2>

{% if messages %}
{% for message in messages %}
<div class="bg-green-100 text-green-800 p-3 mb-4 rounded">
{{ message }}
</div>
{% endfor %}
{% endif %}

<form method="post" class="bg-white p-6 rounded shadow max-w-xl">

{% csrf_token %}

<div class="mb-4">
<label class="block font-semibold mb-2">Nom d'utilisateur</label>
{{ form.username }}
</div>

<div class="mb-4">
<label class="block font-semibold mb-2">Prénom</label>
{{ form.first_name }}
</div>

<div class="mb-4">
<label class="block font-semibold mb-2">Nom</label>
{{ form.last_name }}
</div>

<div class="mb-4">
<label class="block font-semibold mb-2">Email</label>
{{ form.email }}
</div>

<div class="mb-4">
<label class="block font-semibold mb-2">Nouveau mot de passe</label>
{{ form.password }}
</div>

<button type="submit"
class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
Enregistrer
</button>

</form>

{% endblock %}
